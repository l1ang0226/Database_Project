<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易系統 - 期末專案</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">股票交易系統</span>
            <span class="text-white">目前餘額：<strong class="text-warning">$<span id="user-balance">5,000,000</span></strong></span>
        </div>
    </nav>

    <div class="container">
        <div id="auth-container" class="row mb-4">
            <div class="col-md-6 mb-3">
                <div id="login-section" class="card shadow-sm p-4 h-100">
                    <h3>使用者登入</h3>
                    <div class="mb-3">
                        <input type="text" id="login-user" class="form-control" placeholder="帳號">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="login-pass" class="form-control" placeholder="密碼">
                    </div>
                    <button id="login-btn" class="btn btn-outline-primary w-100">登入系統</button>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div id="register-section" class="card shadow-sm p-4 h-100 border-primary">
                    <h3>註冊新帳號</h3>
                    <div class="mb-3">
                        <input type="text" id="reg-user" class="form-control" placeholder="設定帳號">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="reg-pass" class="form-control" placeholder="設定密碼">
                    </div>
                    <button id="reg-btn" class="btn btn-primary w-100">立即註冊</button>
                </div>
            </div>
        </div>

        <div id="user-info-section" class="alert alert-success d-none mb-4" role="alert">
            歡迎回來，<strong id="display-username">使用者</strong>！ 
            您的初始資金為：$<span id="display-initial-balance">0</span>
        </div>

        <div id="market-section" class="card shadow-sm p-4 mb-4">
            <h3>今日股市</h3>
            <table class="table table-hover mt-3 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>股票名稱 (代碼)</th>
                        <th>產業</th>
                        <th>現價 (每股)</th>
                        <th style="width: 180px;">操作</th> 
                    </tr>
                </thead>
                <tbody id="stock-list">
                    </tbody>
            </table>
        </div>

        <div id="portfolio-section" class="card shadow-sm p-4 mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>我的庫存</h3>
                <span class="badge bg-info text-dark fs-6">總資產估值：$<span id="total-assets">0</span></span>
            </div>
            <table class="table table-striped align-middle">
                <thead class="table-light">
                    <tr>
                        <th>股票名稱 (代碼)</th>
                        <th>持股數量 (張)</th>
                        <th>平均成本</th>
                        <th>市值 (1000股/張)</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="portfolio-list">
                    </tbody>
            </table>
        </div>        
    </div>

    <div class="modal fade" id="aiModal" tabindex="-1" aria-labelledby="aiModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title" id="aiModalLabel">
                        <i class="bi bi-robot me-2"></i>AI 個股智能診斷
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center mb-3">
                        <h4 id="ai-stock-title" class="fw-bold text-primary">股票名稱 (代碼)</h4>
                        <p class="text-muted small">分析數據範圍：2024-01-01 至 2026-01-01</p>
                    </div>
                    <div class="chart-container mb-4" style="position: relative; height:300px; width:100%">
                        <canvas id="stockChart"></canvas>
                    </div>
                    <hr>
                    <div class="ai-report-section">
                        <h6 class="fw-bold text-info"><i class="bi bi-file-earmark-text me-1"></i> AI 投資建議報告</h6>
                        <div id="ai-suggestion-box" class="p-3 bg-light rounded border">
                            <div class="placeholder-glow">
                                <span class="placeholder col-7"></span>
                                <span class="placeholder col-4"></span>
                                <span class="placeholder col-4"></span>
                                <span class="placeholder col-6"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉視窗</button>
                    <button type="button" class="btn btn-primary" onclick="generateAIReport()">重新生成報告</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
