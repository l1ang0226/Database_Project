<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易系統 - 登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <span class="navbar-brand mb-0 h1">股票交易系統</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 mb-3">
                <div class="card shadow-sm p-4">
                    <h3>使用者登入</h3>
                    <div class="mb-3 mt-3">
                        <input type="text" id="login-user" class="form-control" placeholder="帳號">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="login-pass" class="form-control" placeholder="密碼">
                    </div>
                    <button id="login-btn" class="btn btn-outline-primary w-100">登入系統</button>
                </div>
            </div>
            <div class="col-md-5 mb-3">
                <div class="card shadow-sm p-4 border-primary">
                    <h3>註冊新帳號</h3>
                    <div class="mb-3 mt-3">
                        <input type="text" id="reg-user" class="form-control" placeholder="設定帳號">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="reg-pass" class="form-control" placeholder="設定密碼">
                    </div>
                    <button id="reg-btn" class="btn btn-primary w-100">立即註冊</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>initLoginPage();</script>
</body>
</html>
