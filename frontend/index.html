<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易系統 - 今日股市</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">股票交易系統</span>
            <div class="d-flex align-items-center gap-3">
                <a href="index.html" class="btn btn-secondary btn-sm">今日股市</a>
                <a href="portfolio.html" class="btn btn-outline-light btn-sm">我的庫存</a>
                <span class="text-white small">餘額：<strong class="text-warning">$<span id="user-balance">0</span></strong></span>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">登出</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="alert alert-success mb-4">
            歡迎回來，<strong id="display-username">使用者</strong>！
        </div>

        <div class="card shadow-sm p-4">
            <h3>今日股市</h3>
            <table class="table table-hover mt-3 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>股票名稱 (代碼)</th>
                        <th>產業</th>
                        <th>現價 (每股)</th>
                        <th style="width: 180px;">操作</th>
                    </tr>
                </thead>
                <tbody id="stock-list"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="aiModal" tabindex="-1" aria-labelledby="aiModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title" id="aiModalLabel">
                        <i class="bi bi-robot me-2"></i>AI 個股智能診斷
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center mb-3">
                        <h4 id="ai-stock-title" class="fw-bold text-primary">股票名稱 (代碼)</h4>
                        <p class="text-muted small">分析數據範圍：2024-01-01 至 2026-01-01</p>
                    </div>
                    <div class="chart-container mb-4" style="position: relative; height:300px; width:100%">
                        <canvas id="stockChart"></canvas>
                    </div>
                    <hr>
                    <div class="ai-report-section">
                        <h6 class="fw-bold text-info"><i class="bi bi-file-earmark-text me-1"></i> AI 投資建議報告</h6>
                        <div id="ai-suggestion-box" class="p-3 bg-light rounded border">
                            <div class="placeholder-glow">
                                <span class="placeholder col-7"></span>
                                <span class="placeholder col-4"></span>
                                <span class="placeholder col-4"></span>
                                <span class="placeholder col-6"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉視窗</button>
                    <button type="button" class="btn btn-primary" onclick="generateAIReport()">重新生成報告</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>initMarketPage();</script>
</body>
</html>
